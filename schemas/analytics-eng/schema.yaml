name: analytics-eng
version: 1
description: Analytics Engineering workflow - context → research → plan → analysis → validation → audit → summary
skills:
  mode: replace
commands:
  mode: replace
artifacts:
  - id: context
    generates: context.md
    description: Stakeholder request and business context gathering
    template: context.md
    instruction: |
      Create the context document that captures WHY this analysis is needed and WHAT question we're answering.

      ## How to consume resources

      For each resource provided, read its content fully and extract what's relevant:
      - **Slack**: Who said what, what question was raised, what decisions or hypotheses
      - **Confluence**: Definitions, prior analyses, business logic, KPI definitions
      - **Looker**: What question it answers, which Explores it uses, filters applied

      Register every resource in the **Source Registry**. A resource is only "consumed"
      when it has an entry with a summary of what it contributed.

      ## Sections to document

      - **Stakeholder Request**: The original question or hypothesis. Who asked? What triggered this?
        Quote the exact phrasing if possible.
      - **Business Context**: Why does this matter? What decisions will this inform?
      - **Source Registry**: Every resource consumed — see template for format. Mandatory.
      - **Key Facts Extracted**: Concrete facts, numbers, definitions from sources.
        These become the assumptions and constraints for Research and Plan.
      - **Success Criteria**: How will we know the analysis answered the question?
      - **Constraints**: Timeline, data access limitations, known data quality issues.

      Keep it focused on understanding the "why". Data exploration comes in Research.
    requires: []

  - id: research
    generates: research.md
    description: Data exploration and feasibility assessment
    template: research.md
    instruction: |
      Explore available data sources to assess feasibility of the analysis.

      ## Source Registry

      Continue the Source Registry from context.md — every asset you read (DBT model,
      BigQuery table, Looker Explore, dashboard, Look) must be registered.
      A resource mentioned but not read is not a source — it is a guess.

      ## Sections to document

      - **Source Registry** (continuation from context.md): Every asset read in this phase
      - **Data Lineage**: Document upstream dependencies using bigquery-lineage output
      - **DBT Models Identified**: Relevant models with path, layer, purpose, key logic
      - **LookML Project** (if inspected): Views, explores, joins, hidden filters, derived tables
      - **Reusable Looker Assets** (via API): Existing dashboards, Looks that cover the topic
      - **Data Sources Identified**: Raw tables or datasets not yet modeled in DBT
      - **Data Quality Assessment**: Completeness, freshness, known issues per source
      - **Feasibility Verdict**: Feasible / Partially Feasible / Not Feasible with justification
      - **Gaps**: What data or modeling is missing? What would need to be built?

      ## Feasibility assessment

      After reading everything, make a clear call:

      - **Feasible**: The question can be answered with existing DBT models or Looker assets.
      - **Partially Feasible**: The question can be partially answered. Document what's missing.
      - **Not Feasible**: Critical data is absent. Raise with stakeholder before continuing.

      **Quality Gate**: If feasibility is Partially Feasible or Not Feasible, stop and
      discuss gaps with the stakeholder before writing the Plan.
    requires:
      - context

  - id: plan
    generates: plan.md
    description: Analysis methodology and approach
    template: plan.md
    instruction: |
      Design the analysis approach based on the question and available data.

      ## Sections to document

      - **Objectives**: Specific, measurable goals. What metrics will answer the question?
      - **Methodology**: Analytical approach (cohort analysis, funnel, regression, etc.)
      - **Metrics Definition**: Clear definitions for each metric, including:
        - Formula/calculation
        - Data source and filters
        - Time period and granularity
      - **Segmentation**: How will data be sliced? (by region, customer type, time period, etc.)
      - **Assumptions**: Documented assumptions about the data or business logic
      - **Edge Cases**: Known scenarios that need special handling
      - **Validation Approach**: How will we verify results are correct?

      Keep methodology appropriate to the question - don't over-engineer simple analyses.
      Reference the Context for success criteria and Research for data constraints.

      **Quality Gate**: Review methodology with stakeholder before executing analysis.
    requires:
      - context
      - research

  - id: analysis
    generates: analysis.md
    description: Execute analysis and document findings
    template: analysis.md
    instruction: |
      Execute the analysis plan and document findings with supporting evidence.

      ## Sections to document

      - **Executive Finding**: One paragraph summary - what's the answer?
      - **Detailed Findings**: Each finding with:
        - Clear statement of the finding
        - Supporting data (tables, charts)
        - Confidence level (high/medium/low)
      - **Queries**: All SQL queries used (for reproducibility)
      - **Visualizations**: Links to Looks or embedded charts
      - **Unexpected Discoveries**: Notable patterns not directly answering the question

      ## Best practices

      - Save ALL queries in the document for reproducibility
      - Create Looks for key visualizations that stakeholders can revisit
      - Note data quality issues encountered during analysis
      - Be explicit about what the data does NOT show
    requires:
      - plan

  - id: validation
    generates: validation.md
    description: "ALIGNMENT CHECK: Did we answer the right question? Maps findings to stakeholder success criteria."
    template: validation.md
    instruction: |
      ## Purpose: Did we answer the RIGHT QUESTION?

      Validation checks ALIGNMENT — whether the analysis addresses what the stakeholder asked.
      It does NOT check correctness (that's Audit's job).

      | Validation | Audit |
      |------------|-------|
      | Did we answer the right question? | Is the answer correct? |
      | Maps findings → success criteria | Verifies SQL and numbers |
      | Checks narrative alignment | Checks technical rigor |

      ## Sections to document

      - **Request vs Findings Matrix**: For each success criterion in context.md, map it
        to a specific finding in analysis.md. Be explicit: if a criterion is not addressed,
        say so — do not mark it as covered when it isn't.
      - **Answer Completeness**: Does the bottom line answer the original question?
        If the question was "why did X happen", does the analysis explain causality
        or only describe correlation?
      - **Missing Angles**: What aspects of the original question are NOT covered?
      - **Stakeholder Verification Points**: Findings where business interpretation
        requires stakeholder confirmation.

      Be blunt. If the analysis drifts from the original question, say so.

      **Quality Gate**: If more than one success criterion is unaddressed, stop and
      flag before proceeding to Audit.
    requires:
      - context
      - analysis

  - id: audit
    generates: audit.md
    description: "CORRECTNESS CHECK: Is the answer right? SQL verification, narrative critique, bias exposure."
    template: audit.md
    instruction: |
      ## Purpose: Is the ANSWER CORRECT?

      Audit checks CORRECTNESS — whether the analysis is technically sound and rigorous.
      You are a skeptical peer reviewer. Stress-test the foundations, expose inconsistencies.

      ## Sections to document

      ### Phase 1: SQL Forensics
      - Re-run each query independently
      - Compare results to numbers cited in findings
      - Document: exact match, rounding difference, or mismatch
      - Verdict per query: Verified / Verified with caveats / Failed

      ### Phase 2: Narrative Critique
      - Causality claims without causal evidence
      - Selective emphasis (data points contradicting conclusion)
      - Magnitude framing issues
      - Trend cherry-picking
      - Segment vs total inconsistency
      - Bias exposure (survivorship, selection, period, Simpson's Paradox)

      ### Phase 3: Refinement Paths
      For each path: Name, Trigger, Action, Expected Impact, Priority

      ### Overall Audit Verdict
      - SQL Integrity: All verified / Issues found
      - Narrative Integrity: Sound / Issues found
      - Confidence in Conclusions: High / Medium / Low
      - Blocker count
      - Recommended next step: Ship as-is / Refine / Restart from Plan
    requires:
      - analysis
      - validation

  - id: summary
    generates: summary.md
    description: Executive summary for stakeholders
    template: summary.md
    instruction: |
      Create a concise executive summary for stakeholder consumption.

      ## Sections to document

      - **Bottom Line**: One sentence answer to the original question
      - **Key Findings**: 3-5 bullet points with the most important insights
      - **Recommendations**: Suggested actions based on findings
      - **Supporting Evidence**: Links to detailed findings, dashboards, Looks
      - **Methodology Note**: Brief description of approach (1-2 sentences)
      - **Caveats & Audit Findings**: CRITICAL — must include:
        - Audit Confidence level (copy from audit.md)
        - Key limitations that affect interpretation
        - Bias considerations from audit.md Phase 2
        - If Audit Confidence was Medium or Low, explain why
      - **Next Steps**: Suggested follow-up analyses or actions

      Write for executives - lead with conclusions, not methodology.
      Keep it to one page if possible.

      **IMPORTANT**: Do not soften or hide audit findings. Stakeholders need to know
      the confidence level and limitations.
    requires:
      - analysis
      - validation
      - audit

  - id: presentation
    generates: presentation.html
    description: Executive slide deck from the completed analysis (optional — requires frontend-slides skill)
    template: presentation.md
    instruction: |
      Generate an executive-quality HTML slide presentation from the completed analysis.

      ## Prerequisites

      Invoke the `frontend-slides` skill using the Skill tool. If the skill is not found
      (local `.claude/skills/` or global `~/.claude/skills/`), inform the user that the
      presentation cannot be generated but the analysis is complete via summary.md.

      ## Content to include

      1. **Title slide**: Analysis title, requestor, date, one-sentence bottom line
      2. **The Question & Why It Matters**: Original question, business context, success criteria
      3. **Key Findings** (1 slide per major finding, max 4): Statement, supporting data, confidence
      4. **Recommendations**: Each recommendation with rationale and priority
      5. **Caveats & Next Steps**: Critical limitations, refinement paths, follow-up analyses
      6. **Appendix: Sources**: Source Registry, links to full analysis

      ## Design guidance

      - Audience: executives, not data engineers
      - Lead with conclusions, never methodology
      - One idea per slide, max 4 bullet points
      - Present caveats clearly — they demonstrate rigor

      Save as `presentation.html` in the change folder (self-contained, no external dependencies).
    requires:
      - summary

apply:
  requires: [summary]
  tracks: null
  instruction: |
    The analytics-eng workflow produces documentation artifacts, not code changes.

    Steps:
    1. Publish findings to Confluence
    2. Create final Looker dashboard if analysis produced new Looks
    3. Notify stakeholders on Slack with bottom line and links
    4. If presentation.html exists, include it in notifications
