name: analytics-eng
version: 1
description: Analytics Engineering workflow - context → research → plan → analysis → validation → audit → summary
skills:
  mode: replace
artifacts:
  - id: context
    generates: context.md
    description: Stakeholder request and business context gathering
    template: context.md
    instruction: |
      Create the context document that captures WHY this analysis is needed and WHAT question we're answering.

      ## FIRST: Ask for specific resources

      Before doing any generic searches, ask the user for specific resources:

      > "Do you have any specific resources for this analysis? For example:
      > - A Slack thread link (e.g., `https://company.slack.com/archives/C.../p...`)
      > - A channel + date range (e.g., `#data-questions, last week`)
      > - A DM or group conversation
      > - A Confluence page or Looker dashboard
      >
      > If not, I'll search broadly — but specific links help me find the right context faster."

      **Wait for the user's response before proceeding.** If they provide specific resources,
      consume those first. If they say "search broadly" or don't have specific resources,
      then proceed with generic searches.

      ## CRITICAL: Consume every resource the user provides

      If the user gives you any link, URL, channel name, dashboard name, or document reference
      — even in passing — you MUST read its content before writing context.md. Do not summarize
      from memory. Do not paraphrase the link title. Open it, read it, extract what's relevant.

      **For each resource provided:**

      - **Slack links or channel references**:
        Use `mcp__plugin_slack_slack__slack_search_public` to find the thread, then read the
        full thread content. Extract: who said what, what question was raised, what decisions
        or hypotheses were stated, what data was referenced. Do not stop at the first message.

      - **Confluence links or page names**:
        Use `mcp__atlassian__confluence_search` to find the page, then `confluence_get_page`
        to read its full content. Extract: relevant definitions, prior analyses, documented
        business logic, or KPI definitions that are relevant to the question.

      - **Looker dashboard or Look links**:
        Use `mcp__bigquery__looker_get_dashboards` or `mcp__bigquery__looker_get_looks` to
        retrieve the asset. Read what metrics, dimensions, and filters it uses. Extract:
        what question it was built to answer, which Explores it queries, what time windows
        it uses. This tells you what already exists analytically.

      - **Any other URL**:
        Fetch and read the content. Do not assume you know what it says.

      After reading each resource, register it in the **Source Registry** (see template).
      A resource is only "consumed" when it has an entry in the Source Registry with a
      summary of what it contributed to understanding the question.

      ## Gather additional context proactively

      Beyond resources the user explicitly provides, search for more:
      - **Slack**: Search for discussions mentioning key terms from the question
        (`mcp__plugin_slack_slack__slack_search_public`)
      - **Confluence**: Search for documentation on the relevant domain
        (`mcp__atlassian__confluence_search`)
      - **Looker**: Check for existing dashboards on the topic
        (`mcp__bigquery__looker_get_dashboards`)

      Apply the same rule: if you find something relevant, read it and register it.

      ## Sections to document

      - **Stakeholder Request**: The original question or hypothesis. Who asked? What triggered this?
        Quote the exact phrasing if possible.
      - **Business Context**: Why does this matter? What decisions will this inform?
      - **Source Registry**: Every resource consumed — see template for format. This is mandatory.
      - **Key Facts Extracted**: Concrete facts, numbers, definitions, or hypotheses extracted
        from sources. These become the assumptions and constraints for Research and Plan.
      - **Success Criteria**: How will we know the analysis answered the question?
      - **Constraints**: Timeline, data access limitations, known data quality issues surfaced
        from sources.

      Keep it focused on understanding the "why". Data exploration comes in Research.
      The Source Registry in this document is the single source of truth for what was read —
      Research will reference and extend it, not duplicate it.
    requires: []

  - id: research
    generates: research.md
    description: Data exploration and feasibility assessment
    template: research.md
    instruction: |
      Explore available data sources to assess feasibility of the analysis.

      ## CRITICAL: Continue the Source Registry from context.md

      context.md contains a Source Registry of everything consumed during context gathering.
      Research EXTENDS that registry — it does not start a new one. Every new asset you read
      in this phase (DBT model, BigQuery table, Looker Explore, dashboard, Look) must be
      added as an entry to the Source Registry in research.md.

      The rule is the same as in context: if you find it, you read it, you register it.
      A resource mentioned but not read is not a source — it is a guess.

      ## Step 1: Inspect the DBT Project (ALWAYS FIRST — BLOCKER)

      Before querying BigQuery, ask the user about DBT projects:

      > "Is there a DBT project relevant to this analysis? If yes, please:
      > - Use `/add-dir` to add the project to context, OR
      > - Tell me the path (e.g., `~/src/project-dbt`)
      >
      > If there's no DBT project or it's not relevant, just say 'skip DBT'."

      **Wait for the user's response before proceeding.** This is a blocker — do not
      continue to BigQuery exploration until you have an answer. DBT models often contain
      the business logic that explains data discrepancies.

      If a DBT project is provided:

      **Project structure:**
      - Read `dbt_project.yml` — understand naming conventions and model organization
      - Use Glob to find relevant models: `models/**/*.sql`
      - Identify staging, intermediate, and mart layers

      **For each model that might be relevant:**
      - Read its SQL file fully — do not skim
      - Read its schema.yml entry for descriptions, column docs, and tests
      - Extract: what business logic is encoded, what filters are hardcoded, what `ref()`
        dependencies it has, what tests define the data contract
      - Register it in the Source Registry with its path, purpose, and what it contributes

      **DBT tests as implicit documentation:**
      - `accepted_values` → reveals the valid domain of a column
      - `not_null` + `unique` → reveals grain and key structure
      - Custom tests → often encode business rules that are not documented elsewhere

      ## Step 2: Explore BigQuery (fill gaps only)

      After DBT, use BigQuery only for what is NOT already modeled:

      - `mcp__bigquery__list_dataset_ids` — list available datasets
      - `mcp__bigquery__list_table_ids` — list tables in a dataset
      - `mcp__bigquery__get_table_info` — read schema and metadata
      - `mcp__bigquery__execute_sql` — row counts, date ranges, sample rows

      For each table you read, register it. Include: full table path, row count,
      date range, and what gap it fills that DBT models don't cover.

      Always use the analysis project for queries, not core.

      ## Step 2.5: Get Upstream Lineage (REQUIRED for key tables)

      For every table that is central to the analysis, get its upstream lineage using
      the `bigquery-lineage` skill:

      ```
      /bigquery-lineage <table_name> --depth 3
      ```

      Use depth 3-5 depending on complexity. This reveals:
      - What raw/source tables feed into the table
      - Intermediate transformations
      - Potential points where data could diverge between sources

      When comparing multiple data sources, get lineage for each and document where
      their pipelines diverge. This often explains discrepancies.

      Register lineage findings in the Source Registry and document in the Data Lineage section.

      ## Step 3: Read Looker Assets — do not just list them

      Use Looker tools to find existing analytics on this topic:
      - `mcp__bigquery__looker_get_explores` — find relevant Explores
      - `mcp__bigquery__looker_get_dashboards` — find existing dashboards
      - `mcp__bigquery__looker_get_looks` — find existing Looks

      For each Explore, dashboard, or Look that is relevant:
      - Read its content (dimensions, measures, filters, time windows)
      - Extract: what question it was built to answer, which metrics it defines,
        what Explores it uses, what filters or date ranges are applied
      - Assess: can the analysis question be answered by running or adapting this asset?
        If yes, this is a reusable asset and should be flagged as such
      - Register it in the Source Registry

      Do not create a new Look or dashboard in this phase. Research is read-only.

      ## Feasibility assessment

      After reading everything, make a clear call:

      - **Feasible**: The question can be answered with existing DBT models or Looker assets.
        No new modeling required.
      - **Partially Feasible**: The question can be partially answered. Document exactly what
        is available and what is missing.
      - **Not Feasible**: Critical data is absent. Document this clearly before proceeding.
        Raise with stakeholder before continuing to Plan.

      ## Sections to document

      - **Source Registry** (continuation from context.md): Every asset read in this phase
      - **DBT Models Identified**: Relevant models with path, layer, purpose, key logic
      - **Reusable Looker Assets**: Existing Explores, dashboards, Looks that cover the topic
      - **Data Sources Identified**: Raw tables or datasets not yet modeled in DBT
      - **Data Quality Assessment**: Completeness, freshness, known issues per source
      - **Feasibility Verdict**: Feasible / Partially Feasible / Not Feasible with justification
      - **Data Lineage**: Source system → raw → DBT staging → intermediate → mart → Looker
      - **Gaps**: What data or modeling is missing? What would need to be built?

      **Quality Gate**: If feasibility is Partially Feasible or Not Feasible, stop and
      discuss gaps with the stakeholder before writing the Plan.
    requires:
      - context

  - id: plan
    generates: plan.md
    description: Analysis methodology and approach
    template: plan.md
    instruction: |
      Design the analysis approach based on the question and available data.

      Sections:
      - **Objectives**: Specific, measurable goals. What metrics will answer the question?
      - **Methodology**: Analytical approach (cohort analysis, funnel, regression, etc.)
      - **Metrics Definition**: Clear definitions for each metric, including:
        - Formula/calculation
        - Data source and filters
        - Time period and granularity
      - **Segmentation**: How will data be sliced? (by region, customer type, time period, etc.)
      - **Assumptions**: Documented assumptions about the data or business logic
      - **Edge Cases**: Known scenarios that need special handling
      - **Validation Approach**: How will we verify results are correct?

      Keep methodology appropriate to the question - don't over-engineer simple analyses.
      Reference the Context for success criteria and Research for data constraints.

      **Quality Gate**: Review methodology with stakeholder before executing analysis.
    requires:
      - context
      - research

  - id: analysis
    generates: analysis.md
    description: Execute analysis and document findings
    template: analysis.md
    instruction: |
      Execute the analysis plan and document findings with supporting evidence.

      Use BigQuery and Looker for analysis:
      - `mcp__bigquery__execute_sql` - Run analytical queries
      - `mcp__bigquery__looker_query` - Query through Looker Explores
      - `mcp__bigquery__looker_make_look` - Create saved Looks for key visualizations
      - `mcp__bigquery__looker_make_dashboard` - Create dashboards if needed

      Sections:
      - **Executive Finding**: One paragraph summary - what's the answer?
      - **Detailed Findings**: Each finding with:
        - Clear statement of the finding
        - Supporting data (tables, charts)
        - Confidence level (high/medium/low)
      - **Queries**: All SQL queries used (for reproducibility)
      - **Visualizations**: Links to Looks or embedded charts
      - **Unexpected Discoveries**: Notable patterns not directly answering the question

      Best practices:
      - Save ALL queries in the document for reproducibility
      - Create Looks for key visualizations that stakeholders can revisit
      - Note data quality issues encountered during analysis
      - Be explicit about what the data does NOT show
    requires:
      - plan

  - id: validation
    generates: validation.md
    description: Validate that findings directly answer the original stakeholder question
    template: validation.md
    instruction: |
      Single-purpose check: does this analysis answer what was asked in Context?

      This is NOT a data quality check (that belongs in Audit). This is a narrative
      alignment check between the stakeholder's question and what the analysis delivers.

      Sections:
      - **Request vs Findings Matrix**: For each success criterion in context.md, map it
        to a specific finding in analysis.md. Be explicit: if a criterion is not addressed,
        say so — do not mark it as covered when it isn't.
      - **Answer Completeness**: Does the bottom line in analysis.md directly answer the
        original question? If the question was "why did X happen", does the analysis
        explain causality or only describe correlation?
      - **Missing Angles**: What aspects of the original question are NOT covered?
        Document them explicitly — these feed into Audit as gap candidates.
      - **Stakeholder Verification Points**: Findings where the data is clear but the
        business interpretation requires stakeholder confirmation (e.g., a metric behaves
        unexpectedly — was there a known event that explains it?).

      Be blunt. If the analysis drifts from the original question, say so.
      **Quality Gate**: If more than one success criterion is unaddressed, stop and
      flag before proceeding to Audit.
    requires:
      - context
      - analysis

  - id: audit
    generates: audit.md
    description: Deep independent audit - SQL verification, narrative critique, and refinement paths
    template: audit.md
    instruction: |
      Perform a rigorous independent audit. You are a skeptical peer reviewer who did NOT
      run this analysis. Your job is to stress-test the foundations, expose inconsistencies,
      and identify what would make this analysis sharper.

      This audit has three distinct phases. Execute all three.

      ---

      ## Phase 1: SQL Forensics

      **CRITICAL — reading order to protect objectivity:**

      1. Open analysis.md and extract ONLY the SQL queries from the "Queries" section.
         Do NOT read the findings, conclusions, or narrative yet.
      2. For each query, form your own expectation of what it should return based solely
         on the SQL logic and your knowledge of the schema.
      3. Execute each query independently using `mcp__bigquery__execute_sql`.
         Record your own results before reading what the analysis claims.
      4. Only after you have your own numbers, read the findings section and compare.

      This order ensures you are not anchored by the analyst's conclusions before
      verifying the data. Reading findings first is a known source of auditor bias.

      For each query:
      - Run it using `mcp__bigquery__execute_sql` and compare results to the numbers
        cited in the findings. Document exact match, rounding difference, or mismatch.
      - Inspect the SQL logic critically:
        - Are JOINs correct? (INNER vs LEFT — could LEFT be silently dropping nulls?)
        - Are date filters applied consistently across all queries?
        - Are WHERE clauses excluding data they shouldn't? (e.g., status filters, soft deletes)
        - Are aggregations at the right grain? (double-counting via fanout on 1:N joins)
        - Are NULLs handled explicitly or silently coerced?
        - Is the time zone consistent across queries?
      - For each query, produce a verdict: **Verified / Verified with caveats / Failed**
        with a one-line explanation.

      If any query fails to reproduce, this is a blocker. Document it and do not proceed
      to Phase 2 until the discrepancy is resolved or explained.

      ---

      ## Phase 2: Narrative Critique

      Read analysis.md as a story. Identify where the narrative and the data diverge.

      Check for:
      - **Causality claims without causal evidence**: If the analysis says "X caused Y",
        does the data actually show causality or only correlation? Rewrite as correlation
        if unsupported.
      - **Selective emphasis**: Are there data points in the queries that contradict the
        main conclusion but are not mentioned? Surface them.
      - **Magnitude framing**: Are percentages used where absolutes would tell a different
        story, or vice versa? (e.g., "50% increase" from 2 to 3 events)
      - **Trend cherry-picking**: Does the time window chosen favor a particular narrative?
        What would the finding look like with a different window?
      - **Segment vs total inconsistency**: Do the segment breakdowns add up to the stated
        total? If segments are exclusive and exhaustive, their sum must match.
      - **Confidence level alignment**: Are High confidence claims backed by large samples
        and clean data? Downgrade if not.
      - **Bias exposure**:
        - Survivorship bias: Are churned/failed/deleted records included where they should be?
        - Selection bias: Is the population analyzed the same as the population the conclusion applies to?
        - Period bias: Is this time window seasonal, affected by an anomaly, or otherwise unrepresentative?
        - Simpson's Paradox: Does the aggregate trend hold when segmented?

      Document each issue found as: **Issue**, **Evidence** (cite the specific finding or query),
      **Severity** (Blocking / Major / Minor), and **Suggested Fix**.

      ---

      ## Phase 3: Refinement Paths

      Based on Phase 1 and Phase 2 findings, generate explicit paths that could sharpen
      this analysis. Each path should reference back to a specific phase in the workflow.

      For each path:
      - **Path Name**: Short descriptive title
      - **Trigger**: What finding or issue prompted this? (cite it)
      - **Action**: What specifically should be done? Which artifact does it affect?
        - If it requires new data or a different model → refine **Research**
        - If it requires redefining a metric or changing segmentation → refine **Plan**
        - If it requires additional queries or a different framing → refine **Analysis**
      - **Expected Impact**: What would this change in the conclusions if addressed?
      - **Priority**: High / Medium / Low

      Aim for 3–7 concrete paths. Avoid generic advice like "consider other factors" —
      every path must be actionable with the tools available (BigQuery, DBT, Looker).

      ---

      ## Overall Audit Verdict

      After all three phases:
      - **SQL Integrity**: All verified / Issues found (list them)
      - **Narrative Integrity**: Sound / Issues found (list them)
      - **Confidence in Conclusions**: High / Medium / Low — with a one-paragraph justification
      - **Blocker count**: How many issues must be resolved before sharing with stakeholders?
      - **Recommended next step**: Ship as-is / Refine specific artifacts / Restart from Plan
    requires:
      - analysis
      - validation

  - id: summary
    generates: summary.md
    description: Executive summary for stakeholders
    template: summary.md
    instruction: |
      Create a concise executive summary for stakeholder consumption.

      This is the primary deliverable. Make it actionable and clear.

      Sections:
      - **Bottom Line**: One sentence answer to the original question
      - **Key Findings**: 3-5 bullet points with the most important insights
      - **Recommendations**: Suggested actions based on findings
      - **Supporting Evidence**: Links to detailed findings, dashboards, Looks
      - **Methodology Note**: Brief description of approach (1-2 sentences)
      - **Caveats**: Critical limitations stakeholders must consider
      - **Next Steps**: Suggested follow-up analyses or actions

      Write for executives - lead with conclusions, not methodology.
      Keep it to one page if possible. Link to Analysis for details.
    requires:
      - analysis
      - validation
      - audit

  - id: presentation
    generates: presentation.html
    description: Executive slide deck from the completed analysis (optional — requires frontend-slides skill)
    template: presentation.md
    instruction: |
      Generate an executive-quality HTML slide presentation from the completed analysis.

      ## Prerequisites check

      This artifact requires the `frontend-slides` skill to be installed.
      Before proceeding, verify it is available:

      ```bash
      ls .claude/skills/ | grep slides
      ```

      If the skill is NOT installed, inform the user:

      > "The `frontend-slides` skill is not installed. To generate the executive
      > presentation, install it by running `openspec update` after adding the skill
      > to your `.claude/skills/` directory, or ask your team admin to make it
      > available. The other artifacts (summary.md, Confluence, Slack) are still
      > complete and usable without it."

      Do not attempt to generate slides without the skill. The skill contains
      specific design guidelines that ensure the output is executive-quality.
      Improvising without it will produce generic results.

      ## If the skill IS available: invoke it with this brief

      Use the `frontend-slides` skill with the following content extracted from the
      completed artifacts. The skill will handle all design decisions.

      **Content to include — in this order:**

      1. **Title slide**
         - Analysis title (from context.md — the original question, not the change name)
         - Requestor and date (from context.md)
         - One-sentence bottom line (from summary.md)

      2. **The Question & Why It Matters** (1 slide)
         - The original stakeholder question verbatim
         - Business context: what decision this informs
         - Success criteria defined at the start

      3. **Key Findings** (1 slide per major finding, max 4)
         - Each finding as a clear statement
         - The supporting number or chart
         - Confidence level
         - Source (which query or Looker asset)

      4. **Recommendations** (1 slide)
         - Each recommendation from summary.md
         - Rationale and priority

      5. **Caveats & Next Steps** (1 slide)
         - Critical limitations from audit.md (blockers or majors only)
         - Top 2-3 refinement paths from audit.md Phase 3 (High priority only)
         - Suggested follow-up analyses from summary.md

      6. **Appendix: Sources** (1 slide)
         - The Source Registry from context.md and research.md
         - Links to full analysis, Looker dashboards, Confluence page

      ## Design guidance to pass to the skill

      - Audience: executives and business stakeholders, not data engineers
      - Tone: authoritative and clear — lead with conclusions, never methodology
      - Data visualizations: simple tables and callout numbers only — no complex charts
      - Each slide: one idea, maximum 4 bullet points, never full paragraphs
      - Caveats: present clearly but not defensively — they demonstrate rigor

      ## Output

      Save the presentation as `presentation.html` in the change folder.
      It should be self-contained (no external dependencies) so it can be
      shared via email or Confluence attachment without broken assets.
    requires:
      - summary

apply:
  requires: [summary]
  tracks: null
  instruction: |
    The analytics-eng workflow produces documentation artifacts, not code changes.
    The apply phase is used to:
    - Share the summary and presentation with stakeholders
    - Create or update Confluence pages with findings
    - Create final Looker dashboards
    - Archive the analysis for future reference

    Steps:
    1. If `presentation.html` exists in the change folder, attach it to the Confluence page
       and include it in the Slack notification.
    2. Publish findings to Confluence:
       - `mcp__atlassian__confluence_create_page` or `confluence_update_page`
       - Include: bottom line, key findings, link to presentation, link to full analysis
    3. Create final Looker dashboard if analysis produced new Looks:
       - `mcp__bigquery__looker_make_dashboard`
    4. Notify stakeholders on Slack:
       - `mcp__plugin_slack_slack__slack_send_message`
       - Include: bottom line, Confluence link, presentation attachment if available
